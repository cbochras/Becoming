# Interaction definitions for the prototype scenes.
# Each entry defines what framework tags an interaction applies,
# and what visibility conditions it requires (if any).
#
# Format:
# interaction_id:
#   tags: {axis: shift_amount}
#   visibility: {axis: min_threshold} (optional — if empty, always visible)
#   flicker_min: {axis: threshold} (optional — flicker range)

[bus_depot]

bench_sit:
  tags = {"vairagya": 0.02, "existentialism": 0.01}
  description = "Sit on the depot bench and wait"
  duration_bonus = true  # Extra tags if player sits > 15 seconds

timetable_read:
  tags = {"nihilism": 0.015}
  description = "Read the outdated timetable"

pigeons_watch:
  tags = {"vairagya": 0.025}
  description = "Watch the pigeons in the rafters"
  duration_bonus = true

exit_hurry:
  tags = {"absurdism": 0.01}
  description = "Leave quickly without looking around"
  is_passive = true  # Triggered by leaving within 30 seconds

[high_street]

notice_board_read:
  tags = {"nihilism": 0.02, "existentialism": 0.01}
  description = "Read the community notice board"

cafe_enter:
  tags = {"existentialism": 0.015, "absurdism": 0.01}
  description = "Enter Mara's cafe"

bench_sit_stranger:
  tags = {"existentialism": 0.025}
  description = "Sit next to the person on the bench"

bench_pass_stranger:
  tags = {"vairagya": 0.01, "nihilism": 0.01}
  description = "Walk past without sitting"
  is_passive = true

shop_window_look:
  tags = {"nihilism": 0.01}
  description = "Look into the empty shop window"

[the_square]

memorial_read:
  tags = {"existentialism": 0.02, "nihilism": 0.01}
  description = "Read the names on the war memorial"

bird_approach:
  tags = {"absurdism": 0.015}
  description = "Walk toward the bird (it flies away)"

lost_object_examine:
  tags = {"existentialism": 0.02}
  description = "Pick up and examine the lost scarf"

lost_object_leave:
  tags = {"vairagya": 0.02}
  description = "Notice it but leave it"
  is_passive = true

library_enter:
  tags = {"nihilism": 0.015, "vairagya": 0.01}
  description = "Enter the library"

[canal_path]

bench_sit_canal:
  tags = {"vairagya": 0.03, "existentialism": 0.015}
  description = "Sit on the bench by the water"
  duration_bonus = true

water_look:
  tags = {"vairagya": 0.02}
  description = "Look at the water's surface"

ruth_approach:
  tags = {"existentialism": 0.02}
  visibility = {"existentialism": 0.6}
  flicker_min = {"existentialism": 0.4}
  description = "Approach the woman on the bench"

walk_east_port:
  tags = {"absurdism": 0.01}
  description = "Walk toward the old port"

[cafe_interior]

mara_talk:
  tags = {"existentialism": 0.02, "absurdism": 0.01}
  description = "Talk to Mara at the counter"

table_sit:
  tags = {"vairagya": 0.02}
  description = "Sit at a table without ordering"
  duration_bonus = true

radio_listen:
  tags = {"absurdism": 0.015, "vairagya": 0.01}
  description = "Listen to the radio"
  duration_bonus = true

window_look:
  tags = {"vairagya": 0.015}
  description = "Look out the window at the street"

menu_read:
  tags = {"nihilism": 0.01}
  description = "Read the unchanged menu"

[library_interior]

shelves_browse:
  tags = {"nihilism": 0.02, "vairagya": 0.01}
  description = "Browse the shelves"

notice_board_library:
  tags = {"nihilism": 0.015, "existentialism": 0.01}
  description = "Read the library notice board"

reading_table_sit:
  tags = {"vairagya": 0.025}
  description = "Sit at the reading table"
  duration_bonus = true

closed_section_look:
  tags = {"nihilism": 0.02}
  description = "Look at the roped-off section"
