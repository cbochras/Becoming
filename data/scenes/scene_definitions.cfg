# Scene definition data for all prototype locations.
# Used for editor tooling and documentation.

[bus_depot]
display_name = "Bus Depot"
type = "interior"
connections = ["high_street_south"]
time_variants = ["morning", "evening"]
ambient = ["echo", "pigeon_coo", "distant_engine"]
description = "Art deco bus depot. Too big for the buses that remain."

[high_street_south]
display_name = "High Street (South)"
type = "exterior"
connections = ["bus_depot", "the_square", "cafe_interior"]
time_variants = ["morning", "afternoon", "evening", "night"]
ambient = ["traffic_distant", "footsteps_passing", "shop_bell"]
description = "Mixed-era shopfronts. Some open, some closed, one empty."

[the_square]
display_name = "The Square"
type = "exterior"
connections = ["high_street_south", "library_interior", "canal_path"]
time_variants = ["morning", "afternoon", "evening", "night"]
ambient = ["birds", "wind_light", "children_distant"]
description = "Open space. War memorial. Benches. The library facade."

[canal_path]
display_name = "Canal Path"
type = "exterior"
connections = ["the_square", "old_port"]
time_variants = ["morning", "afternoon", "evening", "night"]
ambient = ["water_slow", "wind", "seagulls_distant"]
description = "Horizontal. Slow green water. A bench facing it."

[cafe_interior]
display_name = "Mara's Café"
type = "interior"
connections = ["high_street_south"]
time_variants = ["morning", "afternoon", "evening"]
ambient = ["radio_quiet", "cup_clink", "hum_fridge"]
description = "Formica tables. Tin ceiling. Coffee and stillness."

[library_interior]
display_name = "The Library"
type = "interior"
connections = ["the_square"]
time_variants = ["morning", "afternoon"]
ambient = ["silence_deep", "page_turn_distant", "clock_tick"]
description = "Tall shelves. High windows. Fewer people than the space expects."
